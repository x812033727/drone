# drone-platform 預設值。私有部署交付:客戶 override values 即可自建機房部署,
# 資料不出機房(無外部依賴)。正式部署務必覆寫 secrets(見 §secrets)。

# 全域映像設定。私有部署把 registry 指向客戶內部倉庫;tag 建議釘 digest(sha256)。
image:
  registry: ghcr.io/x812033727/drone
  pullPolicy: IfNotPresent
  tag: "0.1.0" # 建議正式改為 @sha256:... 釘選

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# 安全加固旗標。自研 Python 服務套完整 pod+container securityContext(非 root uid 1000);
# 第三方映像(grafana/timescaledb/mosquitto/webconsole)只套 container-level 保守項
# (禁特權升級 + 丟棄 capabilities)。
security:
  # readOnlyRootFilesystem 預設 false。設 true 前務必為 /tmp 等可寫路徑掛 emptyDir,
  # 否則 uvicorn/python 寫入(如 __pycache__、暫存)會失敗導致 Pod 起不來。
  readOnlyRootFilesystem: false

# 密鑰(正式部署務必覆寫;或設 existingSecret 指向預建 Secret)
secrets:
  existingSecret: "" # 設定則用既有 Secret,忽略以下明文
  pgPassword: "change-me-pg"
  grafanaAdminPassword: "change-me-grafana"
  # JWT:設 jwtSecret(HS256)或 jwtJwksUrl(OIDC/RS256)其一以啟用 API 認證
  jwtSecret: ""
  jwtJwksUrl: ""
  jwtAudience: ""
  jwtIssuer: ""

# 機-雲 mTLS(C2:對 cloud/deploy/mqtt-tls 的 k8s 版)。啟用後 broker 走 8883
# 雙向 TLS + per-device ACL,服務以 backend 憑證連線。憑證由預建 Secret 提供
# (certSecret,需含 ca.cert.pem/server.cert.pem/server.key.pem/ca.crl.pem/
#  backend.cert.pem/backend.key.pem;由 cloud/pki 簽發後 kubectl create secret)。
mtls:
  enabled: false
  certSecret: "" # 預建 Secret 名稱(mtls.enabled=true 時必填)

# 資料庫(遙測時序 + fleet/mission 關聯,同一 timescaledb 實例)
timescaledb:
  image: timescale/timescaledb:2.17.2-pg16
  storage: 20Gi
  storageClassName: ""
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits: { cpu: "2", memory: 2Gi }

mosquitto:
  image: eclipse-mosquitto:2.0.20
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits: { cpu: 500m, memory: 256Mi }

# 自研服務(replicas 可調)
fleetsvc:
  replicas: 1
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: "1", memory: 512Mi }

missionsvc:
  replicas: 1
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: "1", memory: 512Mi }

ingest:
  replicas: 1
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: "1", memory: 512Mi }

logsvc:
  replicas: 1
  storage: 10Gi
  storageClassName: ""
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: "1", memory: 512Mi }

webconsole:
  replicas: 1
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits: { cpu: 500m, memory: 256Mi }

grafana:
  enabled: true
  image: grafana/grafana:11.4.0
  anonymous: false # 私有部署預設關匿名(對比 dev compose)
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: 500m, memory: 512Mi }

# 對外入口(僅 Web 指揮中心對外;服務層走叢集內網)
ingress:
  enabled: false
  className: ""
  host: drone.example.com
  annotations: {}
  tls: [] # [{secretName: drone-tls, hosts: [drone.example.com]}]

# ── 生產運維(P1)──────────────────────────────────────────────────────────

# G15 TimescaleDB 備份:CronJob 定期 pg_dump(自訂格式 -Fc)到本地備份 PVC,
# 依 retentionDays 清舊檔。異地/物件儲存(S3/GCS)屬部署決策——本 chart 只做
# 本地 PVC 版;要外送見下方 s3 註解 hook 與 README「備份/還原」段。
backup:
  enabled: true
  schedule: "0 3 * * *" # 每日 03:00(叢集時區)
  retentionDays: 7 # 保留天數,超過者由 CronJob 內 find -mtime 清除
  storage: 10Gi # 備份 PVC 容量
  storageClassName: ""
  # 物件儲存外送(選用):預設關。開啟後 CronJob 於 pg_dump 完成後把備份檔上傳到
  # 指定 bucket(需自備含 aws CLI 的映像與憑證 Secret),資料異地保存。此處只留
  # 旗標與參數 hook,實際上傳指令與映像屬部署決策,範例見 README。
  s3:
    enabled: false
    bucket: "" # 例:s3://my-drone-backups/timescaledb
    # 憑證建議以 existingSecret 掛環境變數(AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY),
    # 或用 IRSA/Workload Identity。本 chart 不代管雲端憑證。

# G16 資料庫 migration:改由 Helm pre-upgrade hook Job 先跑(fleet_svc/mission_svc
# 各自 python -m <svc>.migrate),避免多副本 app 同時啟動自跑 migration 的競態。
# app 啟動時仍會自跑 migration 作為 fallback(冪等:schema_migrations 去重),
# 故 useHook=false 時退回純 app 自跑亦可運作。
migration:
  useHook: true
  # Helm hook 時機。預設僅 pre-upgrade:本 chart 內建 timescaledb,pre-install
  # 階段 DB 尚未建立,若掛 pre-upgrade hook 會連不到 DB 而卡死安裝;故「首次安裝」
  # 的 migration 由 app 啟動自跑(replicas 預設 1,無競態)。若改接「外部既有 DB」,
  # 可加 "pre-install" 讓安裝也走 hook。
  hooks:
    - pre-upgrade
  backoffLimit: 3
  activeDeadlineSeconds: 600

# G17a NetworkPolicy:預設 deny-all ingress + 僅放行必要服務間流量。預設關(需 CNI
# 支援 NetworkPolicy,如 Calico/Cilium;無支援的叢集開了不生效但不影響安裝)。
networkPolicy:
  enabled: false
  # webconsole 需被 Ingress 控制器(通常在他 namespace)連入 :80,故其 ingress 規則
  # 預設放行所有來源;若要收斂成僅特定 namespace,設 ingressControllerNamespace。
  ingressControllerNamespace: ""

# G17b PodDisruptionBudget:多副本服務設 minAvailable,節點排空/升級時保可用。
# 預設開,但只對 replicas>1 的服務產生 PDB(單副本設 PDB 會擋節點排空,故略過)。
pdb:
  enabled: true
  minAvailable: 1
