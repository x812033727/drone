apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "drone.fullname" . }}-mosquitto
  labels:
    {{- include "drone.labels" . | nindent 4 }}
data:
{{- if .Values.mtls.enabled }}
  # mTLS:8883 雙向 TLS + cert CN→username + per-device ACL + CRL(對 cloud/deploy/mqtt-tls)
  mosquitto.conf: |
    listener 8883
    allow_anonymous false
    cafile /mosquitto/certs/ca.cert.pem
    certfile /mosquitto/certs/server.cert.pem
    keyfile /mosquitto/certs/server.key.pem
    require_certificate true
    crlfile /mosquitto/certs/ca.crl.pem
    use_identity_as_username true
    acl_file /mosquitto/config/acl
    persistence false
  acl: |
    pattern write fleet/%u/telemetry
    pattern write fleet/%u/mission/progress
    pattern write fleet/%u/events
    pattern write fleet/%u/sensors/#
    pattern read fleet/%u/cmd/#
    user backend
    topic readwrite fleet/#
{{- else }}
  mosquitto.conf: |
    listener 1883
    # Phase 0/1 內網:anonymous。設 mtls.enabled=true 啟用憑證驗證 + per-device ACL。
    allow_anonymous true
    persistence false
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "drone.fullname" . }}-mosquitto
  labels:
    {{- include "drone.labels" . | nindent 4 }}
    app.kubernetes.io/component: mosquitto
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: mosquitto
  template:
    metadata:
      labels:
        {{- include "drone.labels" . | nindent 8 }}
        app.kubernetes.io/component: mosquitto
    spec:
      containers:
        - name: mosquitto
          image: {{ .Values.mosquitto.image | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # 第三方映像保守處理:禁特權升級 + 丟棄 capabilities(mosquitto uid 1883,
          # 監聽非特權埠,不需任何 cap);不強制 runAsNonRoot/uid。TODO。
          securityContext:
            {{- include "drone.thirdPartyContainerSecurityContext" . | nindent 12 }}
          ports:
            - containerPort: {{ include "drone.mqttPort" . }}
          livenessProbe:
            tcpSocket: { port: {{ include "drone.mqttPort" . }} }
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
          resources:
            {{- toYaml .Values.mosquitto.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /mosquitto/config/mosquitto.conf
              subPath: mosquitto.conf
            {{- if .Values.mtls.enabled }}
            - name: config
              mountPath: /mosquitto/config/acl
              subPath: acl
            - name: mqtt-certs
              mountPath: /mosquitto/certs
              readOnly: true
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "drone.fullname" . }}-mosquitto
        {{- if .Values.mtls.enabled }}
        - name: mqtt-certs
          secret:
            secretName: {{ .Values.mtls.certSecret }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "drone.fullname" . }}-mosquitto
  labels:
    {{- include "drone.labels" . | nindent 4 }}
    app.kubernetes.io/component: mosquitto
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: mosquitto
  ports:
    - port: {{ include "drone.mqttPort" . }}
      targetPort: {{ include "drone.mqttPort" . }}
