apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "drone.fullname" . }}-webconsole
  labels:
    {{- include "drone.labels" . | nindent 4 }}
data:
  # 覆寫映像內建 nginx.conf,把上游指向 k8s 服務名(release 前綴)。
  default.conf: |
    server {
      listen 80;
      server_name _;
      root /usr/share/nginx/html;
      index index.html;

      # 航線/任務 → mission-svc;其餘 /api → fleet-svc(含 SSE /stream,關 buffering)
      location ~ ^/api/v1/(routes|missions) {
        proxy_pass http://{{ include "drone.fullname" . }}-missionsvc:8092;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
      }
      location /api/ {
        proxy_pass http://{{ include "drone.fullname" . }}-fleetsvc:8091;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 3600s;
      }
      {{- if .Values.mediamtx.enabled }}
      # /video/ → mediamtx WHEP(信令;媒體面走 WebRTC UDP 不經 nginx)
      location /video/ {
        proxy_pass http://{{ include "drone.fullname" . }}-mediamtx:8889/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 60s;
      }
      {{- end }}
      location / {
        try_files $uri $uri/ /index.html;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "drone.fullname" . }}-webconsole
  labels:
    {{- include "drone.labels" . | nindent 4 }}
    app.kubernetes.io/component: webconsole
spec:
  replicas: {{ .Values.webconsole.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: webconsole
  template:
    metadata:
      labels:
        {{- include "drone.labels" . | nindent 8 }}
        app.kubernetes.io/component: webconsole
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: webconsole
          image: {{ include "drone.image" (list . "web-console") | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # 第三方 nginx:1.27-alpine 以 root 跑,master 綁定 80(<1024)需 NET_BIND_SERVICE。
          # 保守處理:禁特權升級 + 丟棄其餘 capabilities,不強制 runAsNonRoot(待映像改
          # 為 unprivileged nginx-unprivileged/監聽 8080 再收斂)。TODO。
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
          resources:
            {{- toYaml .Values.webconsole.resources | nindent 12 }}
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-conf
          configMap:
            name: {{ include "drone.fullname" . }}-webconsole
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "drone.fullname" . }}-webconsole
  labels:
    {{- include "drone.labels" . | nindent 4 }}
    app.kubernetes.io/component: webconsole
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: webconsole
  ports:
    - port: 80
      targetPort: 80
{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "drone.fullname" . }}-webconsole
  labels:
    {{- include "drone.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "drone.fullname" . }}-webconsole
                port:
                  number: 80
{{- end }}
