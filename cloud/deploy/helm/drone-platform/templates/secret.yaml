{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "drone.secretName" . }}
  labels:
    {{- include "drone.labels" . | nindent 4 }}
type: Opaque
stringData:
  PG_PASSWORD: {{ .Values.secrets.pgPassword | quote }}
  GRAFANA_ADMIN_PASSWORD: {{ .Values.secrets.grafanaAdminPassword | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  JWT_JWKS_URL: {{ .Values.secrets.jwtJwksUrl | quote }}
  JWT_AUDIENCE: {{ .Values.secrets.jwtAudience | quote }}
  JWT_ISSUER: {{ .Values.secrets.jwtIssuer | quote }}
  # 影像串流帳密(internal auth 模式;http 模式改走 fleet JWT 不用這些)
  VIDEO_PUBLISH_USER: {{ .Values.mediamtx.publishUser | quote }}
  VIDEO_PUBLISH_PASS: {{ .Values.mediamtx.publishPass | quote }}
  VIDEO_READ_USER: {{ .Values.mediamtx.readUser | quote }}
  VIDEO_READ_PASS: {{ .Values.mediamtx.readPass | quote }}
  # 綠界金流憑證(敏感;全空=沙箱模式)。fleetsvc 以 envFrom 注入這些鍵。
  ECPAY_MERCHANT_ID: {{ .Values.ecpay.merchantId | quote }}
  ECPAY_HASH_KEY: {{ .Values.ecpay.hashKey | quote }}
  ECPAY_HASH_IV: {{ .Values.ecpay.hashIV | quote }}
{{- end }}
