apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "drone.fullname" . }}-fleetsvc
  labels:
    {{- include "drone.labels" . | nindent 4 }}
    app.kubernetes.io/component: fleetsvc
spec:
  replicas: {{ .Values.fleetsvc.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: fleetsvc
  template:
    metadata:
      labels:
        {{- include "drone.labels" . | nindent 8 }}
        app.kubernetes.io/component: fleetsvc
    spec:
      securityContext:
        {{- include "drone.podSecurityContext" . | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: fleetsvc
          image: {{ include "drone.image" (list . "fleet_svc") | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- include "drone.containerSecurityContext" . | nindent 12 }}
          envFrom:
            - secretRef:
                name: {{ include "drone.secretName" . }}
          env:
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "drone.secretName" . }}
                  key: PG_PASSWORD
            - name: PG_DSN
              value: {{ include "drone.pgDsn" . | quote }}
            - name: MQTT_HOST
              value: {{ include "drone.fullname" . }}-mosquitto
            - name: MQTT_PORT
              value: {{ include "drone.mqttPort" . | quote }}
            {{- include "drone.mqttTlsEnv" . | nindent 12 }}
            # 綠界金流:憑證(ECPAY_MERCHANT_ID/HASH_KEY/HASH_IV)由上方 envFrom secretRef
            # 注入;URL/price/stage 非敏感,由 values.ecpay 直接帶入(全空=沙箱)。
            - name: ECPAY_RETURN_URL
              value: {{ .Values.ecpay.returnUrl | quote }}
            - name: ECPAY_CLIENT_BACK_URL
              value: {{ .Values.ecpay.clientBackUrl | quote }}
            - name: ECPAY_STAGE
              value: {{ .Values.ecpay.stage | quote }}
            - name: ECPAY_PRICE_PRO
              value: {{ .Values.ecpay.pricePro | quote }}
            - name: ECPAY_PRICE_ENTERPRISE
              value: {{ .Values.ecpay.priceEnterprise | quote }}
            # 配額 / 限流旋鈕(values.quota;全空=用程式寬鬆預設)
            - name: QUOTA_MAX_DEVICES
              value: {{ .Values.quota.maxDevices | quote }}
            - name: QUOTA_MAX_FLEETS
              value: {{ .Values.quota.maxFleets | quote }}
            - name: RATE_LIMIT_PER_MIN
              value: {{ .Values.quota.rateLimitPerMin | quote }}
          ports:
            - containerPort: 8091
          readinessProbe:
            httpGet: { path: /healthz, port: 8091 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8091 }
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
          resources:
            {{- toYaml .Values.fleetsvc.resources | nindent 12 }}
          {{- if .Values.mtls.enabled }}
          volumeMounts:
            - name: mqtt-certs
              mountPath: /mqtt-certs
              readOnly: true
          {{- end }}
      {{- if .Values.mtls.enabled }}
      volumes:
        - name: mqtt-certs
          secret:
            secretName: {{ .Values.mtls.certSecret }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "drone.fullname" . }}-fleetsvc
  labels:
    {{- include "drone.labels" . | nindent 4 }}
    app.kubernetes.io/component: fleetsvc
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: fleetsvc
  ports:
    - port: 8091
      targetPort: 8091
