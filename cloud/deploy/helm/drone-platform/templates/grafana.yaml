{{- if .Values.grafana.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "drone.fullname" . }}-grafana
  labels:
    {{- include "drone.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: grafana
  template:
    metadata:
      labels:
        {{- include "drone.labels" . | nindent 8 }}
        app.kubernetes.io/component: grafana
    spec:
      containers:
        - name: grafana
          image: {{ .Values.grafana.image | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            # 私有部署預設關匿名(對比 dev compose);可用 grafana.anonymous 覆寫
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: {{ .Values.grafana.anonymous | quote }}
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Viewer
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "drone.secretName" . }}
                  key: GRAFANA_ADMIN_PASSWORD
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "drone.secretName" . }}
                  key: PG_PASSWORD
          ports:
            - containerPort: 3000
          resources:
            {{- toYaml .Values.grafana.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "drone.fullname" . }}-grafana
  labels:
    {{- include "drone.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: grafana
  ports:
    - port: 3000
      targetPort: 3000
{{- end }}
