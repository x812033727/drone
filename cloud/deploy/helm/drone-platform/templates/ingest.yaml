apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "drone.fullname" . }}-ingest
  labels:
    {{- include "drone.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingest
spec:
  replicas: {{ .Values.ingest.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: ingest
  template:
    metadata:
      labels:
        {{- include "drone.labels" . | nindent 8 }}
        app.kubernetes.io/component: ingest
    spec:
      securityContext:
        {{- include "drone.podSecurityContext" . | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ingest
          image: {{ include "drone.image" (list . "ingest") | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- include "drone.containerSecurityContext" . | nindent 12 }}
          env:
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "drone.secretName" . }}
                  key: PG_PASSWORD
            - name: PG_DSN
              value: {{ include "drone.pgDsn" . | quote }}
            - name: MQTT_HOST
              value: {{ include "drone.fullname" . }}-mosquitto
            - name: MQTT_PORT
              value: {{ include "drone.mqttPort" . | quote }}
            - name: HEALTH_PORT
              value: {{ .Values.ingest.healthPort | quote }}
            {{- include "drone.mqttTlsEnv" . | nindent 12 }}
          ports:
            - name: health
              containerPort: {{ .Values.ingest.healthPort }}
          # G21:ingest 補 stdlib health 埠(/livez /healthz),改用真 httpGet 探針。
          # liveness 打 /livez(程序活著即 200,不因 MQTT/DB 短暫斷線觸發重啟);
          # readiness 打 /healthz(MQTT+DB pool 皆就緒才 200,否則 503 → 不導流)。
          livenessProbe:
            httpGet:
              path: /livez
              port: health
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.ingest.resources | nindent 12 }}
          {{- if .Values.mtls.enabled }}
          volumeMounts:
            - name: mqtt-certs
              mountPath: /mqtt-certs
              readOnly: true
          {{- end }}
      {{- if .Values.mtls.enabled }}
      volumes:
        - name: mqtt-certs
          secret:
            secretName: {{ .Values.mtls.certSecret }}
      {{- end }}
