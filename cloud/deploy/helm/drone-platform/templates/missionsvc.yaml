apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "drone.fullname" . }}-missionsvc
  labels:
    {{- include "drone.labels" . | nindent 4 }}
    app.kubernetes.io/component: missionsvc
spec:
  replicas: {{ .Values.missionsvc.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: missionsvc
  template:
    metadata:
      labels:
        {{- include "drone.labels" . | nindent 8 }}
        app.kubernetes.io/component: missionsvc
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: missionsvc
          image: {{ include "drone.image" (list . "mission_svc") | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: {{ include "drone.secretName" . }}
          env:
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "drone.secretName" . }}
                  key: PG_PASSWORD
            - name: PG_DSN
              value: {{ include "drone.pgDsn" . | quote }}
            - name: MQTT_HOST
              value: {{ include "drone.fullname" . }}-mosquitto
            - name: MQTT_PORT
              value: "1883"
          ports:
            - containerPort: 8092
          readinessProbe:
            httpGet: { path: /healthz, port: 8092 }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.missionsvc.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "drone.fullname" . }}-missionsvc
  labels:
    {{- include "drone.labels" . | nindent 4 }}
    app.kubernetes.io/component: missionsvc
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: missionsvc
  ports:
    - port: 8092
      targetPort: 8092
