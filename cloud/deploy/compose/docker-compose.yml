# Phase 0 雲端最小棧:MQTT broker + 遙測落庫 + Grafana 看板 + ingest
# + log-svc + MediaMTX(影像錄存回放)
# 對 cloud/README.md「Phase 0 最小目標」。宿主埠可用環境變數覆寫
# (MQTT_PORT / PG_PORT / GRAFANA_PORT / LOGSVC_PORT / RTSP_PORT /
#  PLAYBACK_PORT / MTX_API_PORT),避免與同機其他服務衝突。
#
# 啟動:docker compose up -d --build
# 驗證:python tools/publish_fake_telemetry.py --mqtt-port ${MQTT_PORT:-1883} --count 10
#       開 http://localhost:${GRAFANA_PORT:-3000} 看 fleet 看板

services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/broker/uptime", "-C", "1", "-W", "3"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: drone
      POSTGRES_PASSWORD: ${PG_PASSWORD:-dronedev}
      POSTGRES_DB: drone
    ports:
      - "127.0.0.1:${PG_PORT:-5432}:5432"
    volumes:
      - ./timescale/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - timescale-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drone -d drone"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      # Phase 0 開發內網預設匿名唯讀;正式部署設 GRAFANA_ANONYMOUS=false 關閉
      GF_AUTH_ANONYMOUS_ENABLED: "${GRAFANA_ANONYMOUS:-true}"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-dronedev}
      PG_PASSWORD: ${PG_PASSWORD:-dronedev}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

  ingest:
    build:
      # context 是 repo 根:Dockerfile 需要 COPY interfaces/proto/gen/python
      context: ../../..
      dockerfile: cloud/ingest/Dockerfile
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      PG_DSN: postgresql://drone:${PG_PASSWORD:-dronedev}@timescaledb:5432/drone
    depends_on:
      mosquitto:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

  logsvc:
    build:
      # context 是 repo 根:Dockerfile 需要 COPY tools/ulog_report.py
      context: ../../..
      dockerfile: cloud/log_svc/Dockerfile
    environment:
      PG_DSN: postgresql://drone:${PG_PASSWORD:-dronedev}@timescaledb:5432/drone
      ULOG_DIR: /data/ulog
    ports:
      # 只綁 loopback:Phase 0 無認證,不對外網開(security.md §8 內網豁免)
      - "127.0.0.1:${LOGSVC_PORT:-8090}:8090"
    volumes:
      - ulog-archive:/data/ulog
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      # base image 無 curl,用 stdlib urllib 探活(/healthz 內含 DB SELECT 1)
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8090/healthz', timeout=3)",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  fleetsvc:
    build:
      # context 是 repo 根(與其他 cloud 服務一致)
      context: ../../..
      dockerfile: cloud/fleet_svc/Dockerfile
    environment:
      PG_DSN: postgresql://drone:${PG_PASSWORD:-dronedev}@timescaledb:5432/drone
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      # JWT 認證(dev 預設空=停用;正式部署設 JWT_SECRET 或 JWT_JWKS_URL)
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_JWKS_URL: ${JWT_JWKS_URL:-}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-}
      JWT_ISSUER: ${JWT_ISSUER:-}
    ports:
      # 只綁 loopback:Phase 0 無認證,不對外網開(security.md §8 內網豁免)
      - "127.0.0.1:${FLEETSVC_PORT:-8091}:8091"
    depends_on:
      timescaledb:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    healthcheck:
      # base image 無 curl,用 stdlib urllib 探活(/healthz 內含 DB SELECT 1)
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8091/healthz', timeout=3)",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  missionsvc:
    build:
      context: ../../..
      dockerfile: cloud/mission_svc/Dockerfile
    environment:
      PG_DSN: postgresql://drone:${PG_PASSWORD:-dronedev}@timescaledb:5432/drone
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      # JWT 認證(dev 預設空=停用;正式部署設 JWT_SECRET 或 JWT_JWKS_URL)
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_JWKS_URL: ${JWT_JWKS_URL:-}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-}
      JWT_ISSUER: ${JWT_ISSUER:-}
    ports:
      # 只綁 loopback:Phase 0 無認證,不對外網開(security.md §8 內網豁免)
      - "127.0.0.1:${MISSIONSVC_PORT:-8092}:8092"
    depends_on:
      timescaledb:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8092/healthz', timeout=3)",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  mediamtx:
    # 官方標準 image 無 shell/curl:不設 healthcheck(--wait 對它只等 running,
    # 不影響其他服務的 healthcheck 等待;無人 depends_on 它),
    # 健康/煙霧斷言一律由 host 打已發布埠(見 video_smoke.sh)。
    image: bluenviron/mediamtx:1.12.3
    ports:
      # RTSP 收流(機上推流入口)
      - "${RTSP_PORT:-8554}:8554"
      # 回放 API 與管理 API 只綁 loopback:Phase 0 無認證,不對外網開
      # (security.md §8 內網豁免)
      - "127.0.0.1:${PLAYBACK_PORT:-9996}:9996"
      - "127.0.0.1:${MTX_API_PORT:-9997}:9997"
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
      - mediamtx-recordings:/recordings
    restart: unless-stopped

  webconsole:
    build:
      context: ../../..
      dockerfile: gcs/web-console/Dockerfile
    ports:
      - "${WEBCONSOLE_PORT:-8080}:80"
    depends_on:
      fleetsvc:
        condition: service_healthy
    restart: unless-stopped

volumes:
  timescale-data:
  ulog-archive:
  mediamtx-recordings:
