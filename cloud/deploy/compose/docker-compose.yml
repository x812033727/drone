# Phase 0 雲端最小棧:MQTT broker + 遙測落庫 + Grafana 看板 + ingest
# + log-svc + MediaMTX(影像錄存回放)
# 對 cloud/README.md「Phase 0 最小目標」。宿主埠可用環境變數覆寫
# (MQTT_PORT / PG_PORT / GRAFANA_PORT / LOGSVC_PORT / RTSP_PORT /
#  PLAYBACK_PORT / MTX_API_PORT),避免與同機其他服務衝突。
#
# 啟動:docker compose up -d --build
# 驗證:python tools/publish_fake_telemetry.py --mqtt-port ${MQTT_PORT:-1883} --count 10
#       開 http://localhost:${GRAFANA_PORT:-3000} 看 fleet 看板

services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/broker/uptime", "-C", "1", "-W", "3"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: drone
      POSTGRES_PASSWORD: ${PG_PASSWORD:-dronedev}
      POSTGRES_DB: drone
    ports:
      - "127.0.0.1:${PG_PORT:-5432}:5432"
    volumes:
      - ./timescale/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - timescale-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drone -d drone"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      # Phase 0 開發內網預設匿名唯讀;正式部署設 GRAFANA_ANONYMOUS=false 關閉
      GF_AUTH_ANONYMOUS_ENABLED: "${GRAFANA_ANONYMOUS:-true}"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-dronedev}
      PG_PASSWORD: ${PG_PASSWORD:-dronedev}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

  ingest:
    build:
      # context 是 repo 根:Dockerfile 需要 COPY interfaces/proto/gen/python
      context: ../../..
      dockerfile: cloud/ingest/Dockerfile
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      PG_DSN: postgresql://drone:${PG_PASSWORD:-dronedev}@timescaledb:5432/drone
      HEALTH_PORT: "8081"
    depends_on:
      mosquitto:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    healthcheck:
      # G21:base image 無 curl,用 stdlib urllib 打 health 埠。
      # 用 /livez(health server 一啟動即 200,先於 DB 連線)避免 --wait 卡 readiness;
      # /healthz(MQTT+DB 就緒)語意留給 K8s readiness 探針。
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8081/livez', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  logsvc:
    build:
      # context 是 repo 根:Dockerfile 需要 COPY tools/ulog_report.py
      context: ../../..
      dockerfile: cloud/log_svc/Dockerfile
    environment:
      PG_DSN: postgresql://drone:${PG_PASSWORD:-dronedev}@timescaledb:5432/drone
      ULOG_DIR: /data/ulog
    ports:
      # 只綁 loopback:Phase 0 無認證,不對外網開(security.md §8 內網豁免)
      - "127.0.0.1:${LOGSVC_PORT:-8090}:8090"
    volumes:
      - ulog-archive:/data/ulog
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      # base image 無 curl,用 stdlib urllib 探活(/healthz 內含 DB SELECT 1)
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8090/healthz', timeout=3)",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  fleetsvc:
    build:
      # context 是 repo 根(與其他 cloud 服務一致)
      context: ../../..
      dockerfile: cloud/fleet_svc/Dockerfile
    environment:
      PG_DSN: postgresql://drone:${PG_PASSWORD:-dronedev}@timescaledb:5432/drone
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      # JWT 認證(dev 預設空=停用;正式部署設 JWT_SECRET 或 JWT_JWKS_URL)
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_JWKS_URL: ${JWT_JWKS_URL:-}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-}
      JWT_ISSUER: ${JWT_ISSUER:-}
      # 綠界金流(billing.py;全空=沙箱模式,用綠界公開測試商店,不影響 cloud-smoke)。
      # 走正式收款才填 MERCHANT_ID/HASH_KEY/HASH_IV + RETURN_URL(需外部可達)。
      ECPAY_MERCHANT_ID: ${ECPAY_MERCHANT_ID:-}
      ECPAY_HASH_KEY: ${ECPAY_HASH_KEY:-}
      ECPAY_HASH_IV: ${ECPAY_HASH_IV:-}
      ECPAY_RETURN_URL: ${ECPAY_RETURN_URL:-}
      ECPAY_CLIENT_BACK_URL: ${ECPAY_CLIENT_BACK_URL:-}
      ECPAY_STAGE: ${ECPAY_STAGE:-}
      ECPAY_PRICE_PRO: ${ECPAY_PRICE_PRO:-}
      ECPAY_PRICE_ENTERPRISE: ${ECPAY_PRICE_ENTERPRISE:-}
      # 配額 / 限流(limits.py;全空=程式寬鬆預設,dev/cloud-smoke 不觸發)
      QUOTA_MAX_DEVICES: ${QUOTA_MAX_DEVICES:-}
      QUOTA_MAX_FLEETS: ${QUOTA_MAX_FLEETS:-}
      RATE_LIMIT_PER_MIN: ${RATE_LIMIT_PER_MIN:-}
    ports:
      # 只綁 loopback:Phase 0 無認證,不對外網開(security.md §8 內網豁免)
      - "127.0.0.1:${FLEETSVC_PORT:-8091}:8091"
    depends_on:
      timescaledb:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    healthcheck:
      # base image 無 curl,用 stdlib urllib 探活(/healthz 內含 DB SELECT 1)
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8091/healthz', timeout=3)",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  missionsvc:
    build:
      context: ../../..
      dockerfile: cloud/mission_svc/Dockerfile
    environment:
      PG_DSN: postgresql://drone:${PG_PASSWORD:-dronedev}@timescaledb:5432/drone
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      # JWT 認證(dev 預設空=停用;正式部署設 JWT_SECRET 或 JWT_JWKS_URL)
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_JWKS_URL: ${JWT_JWKS_URL:-}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-}
      JWT_ISSUER: ${JWT_ISSUER:-}
    ports:
      # 只綁 loopback:Phase 0 無認證,不對外網開(security.md §8 內網豁免)
      - "127.0.0.1:${MISSIONSVC_PORT:-8092}:8092"
    depends_on:
      timescaledb:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8092/healthz', timeout=3)",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  mediamtx:
    # 官方標準 image 無 shell/curl:不設 healthcheck(--wait 對它只等 running,
    # 不影響其他服務的 healthcheck 等待;無人 depends_on 它),
    # 健康/煙霧斷言一律由 host 打已發布埠(見 video_smoke.sh)。
    image: bluenviron/mediamtx:1.12.3
    environment:
      # MediaMTX 認證使用者(mediamtx.yml 的 authInternalUsers 留空,見該檔註解)。
      # 帳密由環境變數注入,不硬編;正式部署務必覆寫 VIDEO_PUBLISH_PASS/VIDEO_READ_PASS。
      # 0=publish(RTSP 推流)、1=read(RTSP 拉流)、2=any 僅 api、3=any 僅 playback
      # (api/playback 宿主埠只綁 loopback,security.md §8 內網豁免)。
      MTX_AUTHINTERNALUSERS_0_USER: "${VIDEO_PUBLISH_USER:-publisher}"
      MTX_AUTHINTERNALUSERS_0_PASS: "${VIDEO_PUBLISH_PASS:-dronedev-publish}"
      MTX_AUTHINTERNALUSERS_0_PERMISSIONS_0_ACTION: "publish"
      MTX_AUTHINTERNALUSERS_1_USER: "${VIDEO_READ_USER:-reader}"
      MTX_AUTHINTERNALUSERS_1_PASS: "${VIDEO_READ_PASS:-dronedev-read}"
      MTX_AUTHINTERNALUSERS_1_PERMISSIONS_0_ACTION: "read"
      MTX_AUTHINTERNALUSERS_2_USER: "any"
      MTX_AUTHINTERNALUSERS_2_PERMISSIONS_0_ACTION: "api"
      MTX_AUTHINTERNALUSERS_3_USER: "any"
      MTX_AUTHINTERNALUSERS_3_PERMISSIONS_0_ACTION: "playback"
    ports:
      # RTSP 收流(機上推流入口)—— 需 publish 帳密
      - "${RTSP_PORT:-8554}:8554"
      # 回放 API 與管理 API 只綁 loopback:Phase 0 無認證,不對外網開
      # (security.md §8 內網豁免)
      - "127.0.0.1:${PLAYBACK_PORT:-9996}:9996"
      - "127.0.0.1:${MTX_API_PORT:-9997}:9997"
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
      - mediamtx-recordings:/recordings
    restart: unless-stopped

  webconsole:
    build:
      context: ../../..
      dockerfile: gcs/web-console/Dockerfile
    ports:
      - "${WEBCONSOLE_PORT:-8080}:80"
    # nginx 反代 /api → fleetsvc,/api/v1/{routes,missions} → missionsvc(見 nginx.conf)
    depends_on:
      fleetsvc:
        condition: service_healthy
      missionsvc:
        condition: service_healthy
    restart: unless-stopped

  # 監控閉環(P1):抓各服務 /metrics + 載入 alert-rules。
  # ⚠️ 以 profile "monitoring" 隔離:預設 `docker compose up`(cloud-smoke 用)**不起**
  # 本服務,故不進 --wait 等待、不影響煙霧落庫斷言。啟監控:
  #   docker compose --profile monitoring up -d
  # Prometheus UI 只綁 loopback(security.md §8 內網豁免);正式對外請走反代 + 認證。
  prometheus:
    image: prom/prometheus:v2.55.1
    profiles: ["monitoring"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROM_RETENTION:-15d}
      - --web.enable-lifecycle
    ports:
      - "127.0.0.1:${PROM_PORT:-9464}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # 規則檔單一來源:直接掛 observability/alert-rules.yaml(免複製)
      - ../observability/alert-rules.yaml:/etc/prometheus/rules/alert-rules.yaml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped

volumes:
  timescale-data:
  ulog-archive:
  mediamtx-recordings:
  prometheus-data:
