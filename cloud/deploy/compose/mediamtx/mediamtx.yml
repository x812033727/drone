# MediaMTX 常駐錄存/回放設定(S21):RTSP 收流 + fMP4 錄存 + 回放 API。
# 與 onboard/video_pipeline/docker/mediamtx.yml(POC 延遲量測用)是兩份設定;
# 升版 MediaMTX 時兩處一起動(見 onboard/video_pipeline/README.md)。
# 容器內埠固定(8554/9996/9997),宿主埠由 compose 以環境變數映射。
logLevel: info

# --- 認證(預設關閉匿名)---
# authInternalUsers 留空 [] 以「關掉 MediaMTX 未定義使用者時自動放行的 any 全權
# 使用者」(否則 RTSP :8554 對外裸奔可任意推/拉流)。真正的使用者由
# docker-compose.yml 的 mediamtx.environment 以 MTX_AUTHINTERNALUSERS_* 注入:
#   0) publish 使用者(VIDEO_PUBLISH_USER / VIDEO_PUBLISH_PASS):機上推流入口
#   1) read    使用者(VIDEO_READ_USER    / VIDEO_READ_PASS)  :即時拉流訂閱
#   2) any → api      、3) any → playback
# api/playback 兩個宿主埠只綁 loopback(security.md §8 內網豁免),故留 any;
# 對外的 RTSP publish/read 一律需帳密。正式部署覆寫帳密 + 上 TLS。
#
# ⚠️ MediaMTX v1.12.3 不支援設定檔內 ${ENV} 內插(pass 會原樣存字面 "${VAR}"),
#    且 authInternalUsers 這類物件陣列用 MTX_ 覆寫是「附加」語意——故整份清單
#    留空,全部使用者由環境變數在容器啟動時附加(見 docker-compose.yml)。
authInternalUsers: []

api: yes
apiAddress: :9997

# 回放 API:GET /list?path=… 列時段;GET /get?path=…&start=…&duration=… 取片段
playback: yes
playbackAddress: :9996

rtsp: yes
rtspAddress: :8554

# 常駐棧收 RTSP(機上推流)+ WebRTC/WHEP(操作端瀏覽器訂閱)+ 錄存 + 回放;
# 其餘協議全關,少開埠
rtmp: no
hls: no
srt: no

# WebRTC(WHEP 訂閱端):信令 :8889(HTTP),媒體面走單一 UDP :8189。
# ⚠️ ICE candidate 通告的是容器內埠——宿主映射必須同號(compose 8189:8189/udp);
# 跨機觀看需以 MTX_WEBRTCADDITIONALHOSTS 通告宿主 IP(見 deployment-runbook)。
webrtc: yes
webrtcAddress: :8889
webrtcLocalUDPAddress: :8189

paths:
  # 每台機一條流:drone/<serial>(serial = fleet 裝置序號 = MQTT drone_id)。
  # 正則 path 承接任意機號;錄存以 %path 按機分流。
  "~^drone/[A-Za-z0-9_-]+$":
    record: yes
    recordPath: /recordings/%path/%Y-%m-%d_%H-%M-%S-%f
    recordFormat: fmp4
    recordPartDuration: 1s
    recordSegmentDuration: 15m
    recordDeleteAfter: 72h
