# mosquitto mTLS 硬化設定(C2a)。保留明文 1883 供 dev/內網向後相容;
# 新增 8883 mTLS 監聽器:require client cert(由 Drone Fleet CA 簽發)、
# 以 cert CN 為 username、per-device 主題 ACL。對 security.md §2/§3。
#
# 正式部署應移除明文 1883(僅留 8883);此處保留是為漸進遷移(C2a→C2b)。

# 明文(dev/內網;C2 前既有行為)
listener 1883
allow_anonymous true

# mTLS(C2a):裝置憑證雙向驗證 + CN→username + ACL
listener 8883
allow_anonymous false
cafile /mosquitto/certs/ca.cert.pem
certfile /mosquitto/certs/server.cert.pem
keyfile /mosquitto/certs/server.key.pem
require_certificate true
use_identity_as_username true
acl_file /mosquitto/config/acl
