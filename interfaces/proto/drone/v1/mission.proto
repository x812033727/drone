// 機-雲任務契約 v0.2.0
//
// 傳輸:
//   - MissionProgress:MQTT 主題 `fleet/{drone_id}/mission/progress`(事件觸發,QoS 1)
//   - MissionPlan:MQTT 主題 `fleet/{drone_id}/cmd/mission`(雲 → 機,事件觸發,QoS 1)
//   - MissionCommand:MQTT 主題 `fleet/{drone_id}/cmd/mission_ctrl`
//     (雲 → 機,事件觸發,QoS 1;S23 起機上已實作——mission_exec
//     任務執行期間直訂,無 MQTT 時控制通道自然停用)
// 編碼:Phase 0 使用 proto3 JSON mapping;Phase 1 切換 binary。
//
// v0.2.0(純增量,proto3 向後相容):新增 MissionCommand;MissionProgress.State
// 新增 STATE_PAUSED = 6。
syntax = "proto3";

package drone.v1;

// 單一航點(相對高度座標系,對應 MAVSDK MissionItem 子集)。
message Waypoint {
  // 緯度,度(WGS84)。
  double lat_deg = 1;
  // 經度,度(WGS84)。
  double lon_deg = 2;
  // 相對起飛點高度,公尺。
  float rel_alt_m = 3;
  // 抵達後停留時間,秒(0 = 不停留)。
  float hold_s = 4;
  // 前往此航點的巡航速度,公尺/秒(0 = 使用預設)。
  float speed_ms = 5;
}

// 一次任務的完整航線計畫。
message MissionPlan {
  // 任務唯一識別碼(雲端派遣時產生)。
  string mission_id = 1;
  // 依序執行的航點清單。
  repeated Waypoint waypoints = 2;
  // 完成最後一個航點後是否自動返航(RTL)。
  bool rtl_after_last = 3;
}

// 任務執行進度事件(狀態變化或航點推進時發布)。
message MissionProgress {
  // 任務執行狀態機。
  enum State {
    STATE_UNSPECIFIED = 0;
    // 機上已收到任務計畫。
    STATE_RECEIVED = 1;
    // 任務已上傳至飛控。
    STATE_UPLOADED = 2;
    // 任務執行中。
    STATE_IN_PROGRESS = 3;
    // 任務全部航點完成。
    STATE_COMPLETED = 4;
    // 任務失敗(上傳失敗、中止、失效保護接管等)。
    STATE_FAILED = 5;
    // 任務暫停中(收到 COMMAND_PAUSE;COMMAND_RESUME 後回 STATE_IN_PROGRESS)。
    // v0.2.0 新增;S23 起機上狀態機已接入。
    STATE_PAUSED = 6;
  }

  // 對應 MissionPlan.mission_id。
  string mission_id = 1;
  // 回報機身識別碼(同 MQTT 主題中的 {drone_id})。
  string drone_id = 2;
  // 目前執行中的航點索引(0-based)。
  int32 current_item = 3;
  // 航點總數。
  int32 total_items = 4;
  // 目前狀態。
  State state = 5;
  // 事件時間,Unix epoch 毫秒(UTC)。
  int64 unix_time_ms = 6;
}

// 任務執行控制命令(雲 → 機:對執行中任務下發暫停/續飛/中止)。
// v0.2.0 定契約(MQTT 主題 `fleet/{drone_id}/cmd/mission_ctrl`,QoS 1,
// proto3 JSON);S23 起機上已實作(mission_exec 直訂)。
message MissionCommand {
  // 控制命令種類。
  enum Command {
    COMMAND_UNSPECIFIED = 0;
    // 暫停任務(機上 pause_mission,進度轉 STATE_PAUSED)。
    COMMAND_PAUSE = 1;
    // 續飛(自暫停點續跑任務,進度回 STATE_IN_PROGRESS)。
    COMMAND_RESUME = 2;
    // 中止任務(停止任務並以 RTL 收尾;契約 State 無 ABORTED,
    // 機上以 STATE_FAILED 承載中止終態,log 註明 abort)。
    COMMAND_ABORT = 3;
  }

  // 目標任務(對應 MissionPlan.mission_id;不符者機上拒收)。
  string mission_id = 1;
  // 命令種類。
  Command command = 2;
  // 命令發出時間,Unix epoch 毫秒(UTC)。
  int64 unix_time_ms = 3;
}
