server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # mission-svc:routes/missions CRUD + 派遣/控制。與 fleet-svc 路徑前綴不衝突,
    # 故依前綴分流(較長前綴優先於下方 /api/)。
    location /api/v1/routes {
        proxy_pass http://missionsvc:8092;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }
    location /api/v1/missions {
        proxy_pass http://missionsvc:8092;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # /api → fleet-svc(status/devices/fleets/firmware/stream)。SSE 需關 buffering + 長逾時。
    location /api/ {
        proxy_pass http://fleetsvc:8091;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # SPA:未命中的路徑回退 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
