server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # /api → fleet-svc(同 compose 網路)。SSE 需關 buffering + 長逾時。
    location /api/ {
        proxy_pass http://fleetsvc:8091;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # SPA:未命中的路徑回退 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
