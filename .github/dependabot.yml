# Dependabot:依賴與基底映像的每週 CVE/更新追蹤(商用供應鏈治理起步)。
# 對齊 docs/20-software/security.md §6「依賴掃描」。分組更新以降低 PR 噪音。
version: 2
updates:
  # Python 依賴(各子系統 requirements.txt / pyproject)
  - package-ecosystem: "pip"
    directories:
      - "/tools"
      - "/tools/sitl_scenarios"
      - "/onboard/drone_agent"
      - "/onboard/mission_exec"
      - "/cloud/ingest"
      - "/cloud/log_svc"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      python-deps:
        patterns: ["*"]
    commit-message:
      prefix: "deps"
    ignore:
      # numpy 2.3+ 要求 Python >= 3.11(2.5+ 需 3.12);本專案 CI/執行基線是
      # Python 3.10,pyulog 拉進來的 numpy 守在 2.2.x。升上去會讓 group PR
      # 永久紅(安裝期 "No matching distribution / Requires-Python" 或映像內
      # 無 cp3xx wheel 而退回無編譯器的源碼建置)。待整體升 3.12 再解除。
      - dependency-name: "numpy"
        versions: [">=2.3"]

  # GitHub Actions 版本
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci"

  # 容器基底映像(FROM 行 CVE 追蹤)
  - package-ecosystem: "docker"
    directories:
      - "/cloud/ingest"
      - "/cloud/log_svc"
      - "/onboard/ros2_ws/docker"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "docker"
    ignore:
      # ros2_ws/docker 從源碼建 PX4 v1.15.4,綁定已驗證的 Ubuntu 22.04 LTS
      # 工具鏈;跳 25.04/26.04 的新 GCC 會有未驗證的編譯風險,守在 <=24.04。
      - dependency-name: "ubuntu"
        versions: [">=25.04"]
