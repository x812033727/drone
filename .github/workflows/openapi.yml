name: openapi

# G26 機器可讀 API 契約守門(仿 proto codegen 守門)。
# cloud FastAPI 服務(fleet/mission/log)的 openapi.json 入版控;本 workflow 於相關
# 檔案異動的 PR 重跑 tools/dump_openapi.py 後 git diff --exit-code,確保 commit 的
# 契約與程式碼永遠同步。契約漂移(改了路由/模型卻沒重產契約)會讓此 job 失敗。
on:
  pull_request:
    paths:
      - "cloud/fleet_svc/**"
      - "cloud/mission_svc/**"
      - "cloud/log_svc/**"
      - "interfaces/proto/**"
      - "tools/dump_openapi.py"
      - ".github/workflows/openapi.yml"

jobs:
  contract-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 安裝服務執行依賴 + 生成的 proto 契約套件
        # fleet/mission 於 import 時載入 drone.v1 proto 套件,需先安裝生成碼。
        run: |
          set -euo pipefail
          pip install \
            -r cloud/fleet_svc/requirements.txt \
            -r cloud/mission_svc/requirements.txt \
            -r cloud/log_svc/requirements.txt
          if [ -d interfaces/proto/gen/python ]; then
            pip install -e interfaces/proto/gen/python
          fi

      - name: 重產 OpenAPI 契約,驗證與版控同步
        run: |
          python tools/dump_openapi.py
          git diff --exit-code cloud/*/openapi.json
