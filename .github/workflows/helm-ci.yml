name: helm-ci

# Helm chart 守門:lint + template(渲染成功即驗證模板語法/值)。路徑觸發。
on:
  push:
    branches: [main]
    paths:
      - "cloud/deploy/helm/**"
      - ".github/workflows/helm-ci.yml"
  pull_request:
    paths:
      - "cloud/deploy/helm/**"
      - ".github/workflows/helm-ci.yml"

jobs:
  lint-template:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: azure/setup-helm@v5
        with:
          version: v3.16.3
      - name: helm lint
        run: helm lint cloud/deploy/helm/drone-platform
      - name: helm template(預設)
        run: helm template drone cloud/deploy/helm/drone-platform > /dev/null
      - name: helm template(生產覆寫:JWT + ingress)
        run: |
          helm template drone cloud/deploy/helm/drone-platform \
            --set secrets.jwtSecret=abcdefghijklmnopqrstuvwxyz123456 \
            --set ingress.enabled=true --set ingress.host=drone.example.com > /dev/null
      - name: helm template(影像 http 認證 + simcam + 跨機通告)
        run: |
          helm template drone cloud/deploy/helm/drone-platform \
            --set mediamtx.auth.mode=http --set mediamtx.simcam.enabled=true \
            --set mediamtx.webrtcAdditionalHosts="{203.0.113.5}" > /dev/null
      - name: helm template(影像關閉)
        run: |
          helm template drone cloud/deploy/helm/drone-platform \
            --set mediamtx.enabled=false > /dev/null
      - name: helm template(mTLS 啟用)
        run: |
          helm template drone cloud/deploy/helm/drone-platform \
            --set mtls.enabled=true --set mtls.certSecret=drone-mqtt-certs > /dev/null
      - name: helm template(運維:NetworkPolicy + 多副本 PDB)
        run: |
          helm template drone cloud/deploy/helm/drone-platform \
            --set networkPolicy.enabled=true \
            --set fleetsvc.replicas=2 --set missionsvc.replicas=2 > /dev/null
