name: proto

on:
  pull_request:
    paths:
      - "interfaces/**"
      - ".github/workflows/proto.yml"

jobs:
  lint-and-codegen:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          # buf breaking 需與 main 比對:抓完整歷史,拿得到 main ref
          fetch-depth: 0

      - name: 安裝 buf(官方 release binary,版本固定)
        env:
          BUF_VERSION: 1.71.0
        run: |
          curl -fsSL -o /usr/local/bin/buf \
            "https://github.com/bufbuild/buf/releases/download/v${BUF_VERSION}/buf-Linux-x86_64"
          chmod +x /usr/local/bin/buf
          buf --version

      - name: buf lint
        working-directory: interfaces/proto
        run: buf lint

      - name: buf breaking(對 main 檢查破壞性變更)
        run: |
          # PR 一律有 origin/main;取其 ref 供 buf 比對(subdir 指到 proto 模組)
          git fetch --no-tags --depth=1 origin main
          buf breaking interfaces/proto \
            --against '.git#ref=FETCH_HEAD,subdir=interfaces/proto'

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: 安裝 codegen 工具鏈(固定版 grpcio-tools)
        run: pip install -r interfaces/proto/requirements-dev.txt

      - name: 重跑 codegen,驗證生成碼與 schema 同步
        run: |
          bash interfaces/proto/generate.sh
          git diff --exit-code interfaces/proto/gen/
