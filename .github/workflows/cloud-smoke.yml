name: cloud-smoke

on:
  pull_request:
    paths:
      - "cloud/**"
      - "tools/publish_fake_telemetry.py"
      - "interfaces/**"
      - ".github/workflows/cloud-smoke.yml"
      # 機載端 mediamtx 設定改動也該觸發 video-record-smoke(S25 補漏):
      # 推流端行為變了,錄存回放鏈可能一起壞
      - "onboard/video_pipeline/docker/mediamtx.yml"

jobs:
  compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: cloud/deploy/compose
    steps:
      - uses: actions/checkout@v7

      - name: 起雲端最小棧(等待 healthcheck)
        run: docker compose up -d --build --wait --wait-timeout 180

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 打 10 筆假遙測 + sensors 三主題各 1 筆(S22)+ mission/events 各 1 筆(S25)
        working-directory: .
        run: |
          pip install paho-mqtt protobuf
          pip install -e interfaces/proto/gen/python
          python tools/publish_fake_telemetry.py --drone-id ci-1 --rate 5 --count 10 \
            --with-sensors --with-mission-events

      - name: 斷言遙測落庫
        run: |
          sleep 3
          COUNT=$(docker compose exec -T timescaledb \
            psql -U drone -d drone -tAc "SELECT count(*) FROM telemetry WHERE drone_id='ci-1'")
          echo "telemetry rows: ${COUNT}"
          test "${COUNT}" -ge 1

      - name: 斷言 sensors 三表落庫(S22 高頻流,QoS 0)
        run: |
          for table in sensor_attitude sensor_gps sensor_local_position; do
            COUNT=$(docker compose exec -T timescaledb \
              psql -U drone -d drone -tAc "SELECT count(*) FROM ${table} WHERE drone_id='ci-1'")
            echo "${table} rows: ${COUNT}"
            test "${COUNT}" -ge 1
          done

      - name: 斷言 mission_progress / flight_events 落庫(S25 補漏:ingest 四訂閱全覆蓋)
        run: |
          for table in mission_progress flight_events; do
            COUNT=$(docker compose exec -T timescaledb \
              psql -U drone -d drone -tAc "SELECT count(*) FROM ${table} WHERE drone_id='ci-1'")
            echo "${table} rows: ${COUNT}"
            test "${COUNT}" -ge 1
          done

      - name: 斷言 log-svc 收檔落庫(假檔非合法 ULog → report_ok=false 也是有效斷言)
        run: |
          echo "not a real ulog" > fake.ulg
          curl -sf -F "file=@fake.ulg" http://127.0.0.1:8090/api/v1/logs/ci-1
          echo ""
          # volume 內存在(容器路徑 /data/ulog/ci-1/{UTC 時戳}_fake.ulg)
          docker compose exec -T logsvc ls -l /data/ulog/ci-1/
          # 報告在背景跑:輪詢落庫(非法 ULog → report_ok=false 照落庫)
          for i in $(seq 1 30); do
            COUNT=$(docker compose exec -T timescaledb \
              psql -U drone -d drone -tAc "SELECT count(*) FROM flight_logs WHERE drone_id='ci-1'")
            [ "${COUNT}" -ge 1 ] && break
            sleep 2
          done
          echo "flight_logs rows: ${COUNT}"
          test "${COUNT}" -ge 1
          BAD=$(docker compose exec -T timescaledb \
            psql -U drone -d drone -tAc \
            "SELECT count(*) FROM flight_logs WHERE drone_id='ci-1' AND report_ok=false")
          echo "report_ok=false rows: ${BAD}"
          test "${BAD}" -ge 1
          # GET list 回 JSON 含該檔
          LIST=$(curl -sf http://127.0.0.1:8090/api/v1/logs/ci-1)
          echo "${LIST}"
          echo "${LIST}" | grep -q "fake.ulg"

      - name: 失敗時傾印容器日誌
        if: failure()
        run: docker compose logs --tail 200

      - name: 收攤
        if: always()
        run: docker compose down -v

  # S21 影像錄存回放:mediamtx 服務獨立起(無 build,~3-4 分),
  # 推流→/list→/get→ffprobe 斷言全在 video_smoke.sh(本地/CI 共用;
  # 失敗傾印 mediamtx 日誌與 down -v 由腳本 trap 處理)
  video-record-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: cloud/deploy/compose
    steps:
      - uses: actions/checkout@v7

      - name: 裝 ffmpeg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: 錄存回放煙霧(推流 → list → get → ffprobe)
        run: COMPOSE_PROJECT=video-smoke-ci ./video_smoke.sh
