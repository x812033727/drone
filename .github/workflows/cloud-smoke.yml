name: cloud-smoke

on:
  pull_request:
    paths:
      - "cloud/**"
      - "tools/publish_fake_telemetry.py"
      - "interfaces/**"
      - ".github/workflows/cloud-smoke.yml"
      # 機載端 mediamtx 設定改動也該觸發 video-record-smoke(S25 補漏):
      # 推流端行為變了,錄存回放鏈可能一起壞
      - "onboard/video_pipeline/docker/mediamtx.yml"

jobs:
  compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: cloud/deploy/compose
    steps:
      - uses: actions/checkout@v7

      - name: 起雲端最小棧(等待 healthcheck)
        run: docker compose up -d --build --wait --wait-timeout 180

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: 打 10 筆假遙測 + sensors 三主題各 1 筆(S22)+ mission/events 各 1 筆(S25)
        working-directory: .
        run: |
          pip install paho-mqtt protobuf
          pip install -e interfaces/proto/gen/python
          python tools/publish_fake_telemetry.py --drone-id ci-1 --rate 5 --count 10 \
            --with-sensors --with-mission-events --with-heartbeat

      - name: 斷言遙測落庫
        run: |
          sleep 3
          COUNT=$(docker compose exec -T timescaledb \
            psql -U drone -d drone -tAc "SELECT count(*) FROM telemetry WHERE drone_id='ci-1'")
          echo "telemetry rows: ${COUNT}"
          test "${COUNT}" -ge 1

      - name: 斷言 sensors 三表落庫(S22 高頻流,QoS 0)
        run: |
          for table in sensor_attitude sensor_gps sensor_local_position; do
            COUNT=$(docker compose exec -T timescaledb \
              psql -U drone -d drone -tAc "SELECT count(*) FROM ${table} WHERE drone_id='ci-1'")
            echo "${table} rows: ${COUNT}"
            test "${COUNT}" -ge 1
          done

      - name: 打 5 輪假酬載遙測(G8:payload/status|spray|battery)
        working-directory: .
        run: python tools/publish_fake_payload.py --drone-id ci-1 --rate 5 --count 5

      - name: 斷言 payload 三表落庫(dialect 消費鏈下游)
        run: |
          sleep 3
          for table in payload_status spray_telemetry battery_detail; do
            COUNT=$(docker compose exec -T timescaledb \
              psql -U drone -d drone -tAc "SELECT count(*) FROM ${table} WHERE drone_id='ci-1'")
            echo "${table} rows: ${COUNT}"
            test "${COUNT}" -ge 1
          done
          # NaN 原樣落庫(spray.application_rate_ml_m2)
          NAN=$(docker compose exec -T timescaledb \
            psql -U drone -d drone -tAc \
            "SELECT count(*) FROM spray_telemetry WHERE drone_id='ci-1' AND application_rate_ml_m2 = 'NaN'::real")
          echo "NaN rows: ${NAN}"
          test "${NAN}" -ge 1

      - name: 斷言 mission_progress / flight_events / device_heartbeat 落庫(ingest 五訂閱全覆蓋)
        run: |
          for table in mission_progress flight_events device_heartbeat; do
            COUNT=$(docker compose exec -T timescaledb \
              psql -U drone -d drone -tAc "SELECT count(*) FROM ${table} WHERE drone_id='ci-1'")
            echo "${table} rows: ${COUNT}"
            test "${COUNT}" -ge 1
          done

      - name: 斷言 log-svc 收檔落庫(假檔非合法 ULog → report_ok=false 也是有效斷言)
        run: |
          echo "not a real ulog" > fake.ulg
          curl -sf -F "file=@fake.ulg" http://127.0.0.1:8090/api/v1/logs/ci-1
          echo ""
          # volume 內存在(容器路徑 /data/ulog/ci-1/{UTC 時戳}_fake.ulg)
          docker compose exec -T logsvc ls -l /data/ulog/ci-1/
          # 報告在背景跑:輪詢落庫(非法 ULog → report_ok=false 照落庫)
          for i in $(seq 1 30); do
            COUNT=$(docker compose exec -T timescaledb \
              psql -U drone -d drone -tAc "SELECT count(*) FROM flight_logs WHERE drone_id='ci-1'")
            [ "${COUNT}" -ge 1 ] && break
            sleep 2
          done
          echo "flight_logs rows: ${COUNT}"
          test "${COUNT}" -ge 1
          BAD=$(docker compose exec -T timescaledb \
            psql -U drone -d drone -tAc \
            "SELECT count(*) FROM flight_logs WHERE drone_id='ci-1' AND report_ok=false")
          echo "report_ok=false rows: ${BAD}"
          test "${BAD}" -ge 1
          # GET list 回 JSON 含該檔
          LIST=$(curl -sf http://127.0.0.1:8090/api/v1/logs/ci-1)
          echo "${LIST}"
          echo "${LIST}" | grep -q "fake.ulg"

      - name: 失敗時傾印容器日誌
        if: failure()
        run: docker compose logs --tail 200

      - name: 收攤
        if: always()
        run: docker compose down -v

  # S21 影像錄存回放:mediamtx 服務獨立起(無 build,~3-4 分),
  # 推流→/list→/get→ffprobe 斷言全在 video_smoke.sh(本地/CI 共用;
  # 失敗傾印 mediamtx 日誌與 down -v 由腳本 trap 處理)
  video-record-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: cloud/deploy/compose
    steps:
      - uses: actions/checkout@v7

      - name: 裝 ffmpeg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: 錄存回放煙霧(推流 → list → get → ffprobe)
        run: COMPOSE_PROJECT=video-smoke-ci ./video_smoke.sh

  # V4 合成相機:build simcam → 推流 drone/sim-1 → path ready → WHEP 201。
  # path-gate 由 workflow 觸發條件涵蓋(cloud/** 與 onboard/video_pipeline/**)。
  simcam-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: cloud/deploy/compose
    steps:
      - uses: actions/checkout@v7
      - name: 起 mediamtx + simcam
        run: docker compose --profile simcam up -d --build --wait mediamtx simcam
      - name: 等 path ready(drone/sim-1)
        run: |
          for i in $(seq 1 60); do
            READY=$(curl -fsS "http://127.0.0.1:9997/v3/paths/get/drone%2Fsim-1" 2>/dev/null \
              | python3 -c 'import json,sys; print(json.load(sys.stdin).get("ready"))' 2>/dev/null || true)
            [ "$READY" = "True" ] && exit 0
            sleep 1
          done
          echo "path 未就緒" >&2
          docker compose logs --tail 50 simcam mediamtx >&2
          exit 1
      - name: WHEP 信令 201(帶讀取帳密)
        run: |
          # 直接寫檔:$(printf) 命令替換會剝尾端 CRLF → SDP 缺結尾 → 400(實測)
          printf 'v=0\r\no=- 0 0 IN IP4 127.0.0.1\r\ns=-\r\nt=0 0\r\na=group:BUNDLE 0\r\na=ice-ufrag:cisimcam\r\na=ice-pwd:cisimcamcisimcamcisimcam\r\na=fingerprint:sha-256 4A:AD:B9:B1:3F:82:18:3B:54:02:12:DF:3E:5D:49:6B:19:E5:7C:AB:11:22:33:44:55:66:77:88:99:AA:BB:CC\r\nm=video 9 UDP/TLS/RTP/SAVPF 96\r\nc=IN IP4 0.0.0.0\r\na=mid:0\r\na=recvonly\r\na=rtpmap:96 H264/90000\r\na=fmtp:96 packetization-mode=1;profile-level-id=42e01f\r\na=setup:actpass\r\na=rtcp-mux\r\n' > /tmp/offer.sdp
          CODE=$(curl -s -o /dev/null -w '%{http_code}' \
            -u reader:dronedev-read -X POST -H 'Content-Type: application/sdp' \
            --data-binary @/tmp/offer.sdp "http://127.0.0.1:8889/drone/sim-1/whep")
          echo "WHEP: $CODE"
          test "$CODE" = "201"
      - name: 失敗傾印
        if: failure()
        run: docker compose logs --tail 100
      - name: 收攤
        if: always()
        run: docker compose --profile simcam down -v
