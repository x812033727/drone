# SITL 整合測試:mission_exec 對 PX4 SITL(headless Gazebo)跑 demo_square 任務全程,
# 驗證 RECEIVED → UPLOADED → IN_PROGRESS → COMPLETED 完整序列。
#
# 刻意不掛 pull_request:SITL 需要實時模擬(單跑約 5-8 分鐘)且穩定性未知,
# 先以 nightly 觀察,連續穩定約兩週後再評估升為 PR gate。
#
# 已知限制:PX4_SIM_SPEED_FACTOR 在此 image 不易注入(啟動腳本未透傳),
# 先用實時模擬;若之後要加速,需換基底 image 或自建。
name: sitl-integration

on:
  schedule:
    # UTC 18:43 = 台北 02:43。
    # 排程觸發觀察紀錄(S25):原 cron 為 `30 18 * * *`,兩晚皆未觸發——
    # - 07-10 18:30 UTC slot:workflow 於 07-10 19:34 UTC 才上 main,未涵蓋(預期內);
    # - 07-11 18:30 UTC slot(第一個有效 slot):輪詢至 18:51 UTC,
    #   `gh run list --event schedule` 仍零筆,21 分鐘未觸發已超出常見延遲。
    # 緩解:改 `43 18 * * *`。GitHub 文件明載 schedule 為 best-effort,
    # 高負載時點會延遲甚至丟棄,整點/半點(:00/:30)是最熱門分鐘,官方建議
    # 錯開;新 workflow / 低活躍 repo 更常見長延遲。另注意 repo 60 天無
    # commit 會自動停用排程(本 repo 活躍,非此因)。
    # 若明晚(台北 02:43)仍未觸發,考慮改用外部排程器打 workflow_dispatch。
    - cron: "43 18 * * *"
  workflow_dispatch:

jobs:
  mission-sitl:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: 啟動 PX4 SITL(背景容器)
        # 此 image 會主動把 MAVLink 封包送往 docker gateway(即 host),
        # host 端客戶端用 udpin://0.0.0.0:14540 監聽即可收到——
        # 不需要也不應該做 -p UDP 埠映射(方向相反,映射反而無效)。
        # 預設 bridge 網路即可,毋須 --network host(本機與 runner 皆實測可用)。
        run: docker run --rm -d --name px4-sitl jonasvautherin/px4-gazebo-headless:1.15.4

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: 安裝 mission_exec(editable)+ proto 生成碼套件
        run: |
          pip install -e onboard/mission_exec
          pip install -e interfaces/proto/gen/python

      - name: 等待 SITL EKF/GPS lock(實測約 40 秒,留餘裕)
        run: sleep 60

      - name: 執行 demo_square 任務
        # mission_exec 已 editable 安裝(S11 起有 pyproject);working-directory
        # 只是讓 --mission 相對路徑成立。timeout 300 為單次任務上限,
        # 早於 job 層 timeout-minutes 觸發以便留時間傾印 log。
        working-directory: onboard/mission_exec
        run: |
          set -o pipefail
          timeout 300 python -m mission_exec.main \
            --mission missions/demo_square.json --drone-id ci-1 \
            | tee /tmp/mission-output.log

      - name: 斷言任務完成(STATE_COMPLETED)
        run: grep "STATE_COMPLETED" /tmp/mission-output.log

      - name: 失敗時傾印 SITL log
        if: failure()
        run: docker logs px4-sitl --tail 100 || true

      - name: 清理 SITL 容器
        if: always()
        run: docker rm -f px4-sitl || true

  # 場景回歸:F05–F08 自動任務(S24)+ F09–F12 失效保護(S7),承載
  # flight-test-plan F05–F12 的 SITL 預跑(F09–F12 另對應 docs/03-safety-analysis.md
  # §4 矩陣)。matrix 每場景一個獨立 runner VM + 獨立 SITL 容器(場景會改參數/
  # 放電/觸發失效保護,兩趟間殘留任務也會汙染,不可共用容器)。
  # f07 場景自帶專屬高位埠 mosquitto 容器(場景內起與清)。
  # 同 mission-sitl:nightly 觀察,不擋 PR。
  failsafe-scenarios:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        scenario: [f05, f06, f07, f08, f09, f10, f11, f12]
    steps:
      - uses: actions/checkout@v7

      - name: 啟動 PX4 SITL(背景容器)
        # 同 mission-sitl:此 image 主動送 MAVLink 到 host,監聽即可,不做埠映射。
        run: docker run --rm -d --name px4-failsafe jonasvautherin/px4-gazebo-headless:1.15.4

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: 安裝場景依賴(runner 複用 mission_exec,S11 起需一併安裝)
        run: |
          pip install -r tools/sitl_scenarios/requirements.txt
          pip install -e onboard/mission_exec
          pip install -e interfaces/proto/gen/python

      - name: 等待 SITL EKF/GPS lock(實測約 40 秒,留餘裕)
        run: sleep 60

      - name: 執行場景 ${{ matrix.scenario }}
        # --container:F10 走 docker exec(px4-listener/px4-param)、
        # F09 走 docker inspect 取源 IP 過濾被動觀測。timeout 900 早於
        # job 層 timeout-minutes 觸發,留時間傾印 log。
        working-directory: tools
        run: |
          set -o pipefail
          timeout 900 python -m sitl_scenarios --scenario ${{ matrix.scenario }} \
            --url udpin://0.0.0.0:14540 --container px4-failsafe \
            | tee /tmp/scenario-${{ matrix.scenario }}.log

      - name: 斷言場景 PASS
        run: 'grep "RESULT: PASS" /tmp/scenario-${{ matrix.scenario }}.log'

      - name: 失敗時傾印 SITL log
        if: failure()
        run: docker logs px4-failsafe --tail 200 || true

      - name: 清理 SITL 容器
        if: always()
        run: docker rm -f px4-failsafe || true

  # uXRCE-DDS 煙霧(S8)+ DDS→MQTT 橋煙霧(S22):PX4 SITL(自建 SIH image)
  # → Micro XRCE-DDS Agent → ROS 2 topic → px4_mqtt_bridge → mosquitto。
  # 直接跑 onboard/ros2_ws/run_smoke.sh(與本地同一條路徑:
  # build 兩顆 image + agent + SITL + listener + bridge/mosquitto_sub + 清理)。
  # 注意:不用 gazebo-headless image——其 1.15.x 系列不含 uxrce_dds_client
  # (詳 onboard/ros2_ws/docker/Dockerfile.px4-sitl-dds 註解)。
  # 納入 nightly 的理由:agent/px4_msgs/PX4 皆無現成二進位可用,只能 source
  # build,runner 無 docker 快取每晚全量重建(本機 8 核共約 15 分,
  # 2 核 runner 估 35-50 分)——nightly 時段可接受,換到的是
  # 「px4_msgs release/1.15 ↔ 韌體 1.15.4 訊息相容 + QoS 設定」的持續回歸,
  # 這正是升 PX4 版本時最容易無聲壞掉的一環。同前兩個 job:nightly 觀察,不擋 PR。
  uxrce-dds-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@v7

      - name: 跑 uXRCE-DDS 煙霧(含兩顆 image build,無快取)
        # run_smoke.sh 內建:UDP 8888/14550 埠占檢查、px4-s8-*/ros2-s8-*
        # 容器命名、trap 清理、失敗傾印 agent/SITL log。
        run: ./onboard/ros2_ws/run_smoke.sh

  # VT-OPS-03 端到端演示(S25):派遣 → 飛行 → 遙測落庫 → ULog 自動回收
  # 出報告,全鏈由 tools/e2e_demo.sh 承載(= 軟體版 F19 的可重複載體,
  # 02-verification-validation.md RTM 有註記)。腳本內建 compose/SITL/agent
  # 啟停、trap 清理、失敗傾印與 psql 斷言;結論行 E2E RESULT: PASS/FAIL。
  # 同前述 job:nightly 觀察,不擋 PR。
  e2e-demo:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: 安裝依賴(派遣端 + agent + mission_exec + 契約生成碼)
        run: |
          pip install -r tools/requirements.txt
          pip install -r onboard/drone_agent/requirements.txt
          pip install -e onboard/mission_exec
          pip install -e interfaces/proto/gen/python

      - name: 端到端演示(compose + SITL + agent + dispatch + 落庫斷言)
        # CI runner 埠乾淨,全部用腳本預設(offboard 14540 / gRPC 50051 /
        # compose 預設埠);本地執行請改用隔離埠,見腳本開頭註解。
        run: ./tools/e2e_demo.sh
