name: api-fuzz

# schemathesis 契約模糊測試(R7,auth-aware):對 fleet-svc/mission-svc live server
# 打。觀測期 continue-on-error(沿 security.yml 前例)——fuzz 首波必翻出 422/500
# 邊角,收訊修完再升 blocking。unauth 保護斷言(assert_unauth.py)為確定性,直接紅。
# PR 短跑 25 examples(path-gate);weekly 深跑 300。billing callback 以 --exclude 排除。

on:
  pull_request:
    paths:
      - "cloud/**"
      - ".github/workflows/api-fuzz.yml"
  schedule:
    - cron: "20 19 * * 1" # 週一台北 03:20
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  fuzz:
    runs-on: ubuntu-latest
    # PR 短跑(25 examples)數分鐘內收工;weekly/dispatch 深跑(300 examples)遇
    # 已知會觸發 500 的輸入(surrogate serial/超大整數)時 schemathesis 進入收斂
    # (shrinking)會很慢,25 分鐘不夠→job 逾時→GitHub 標記 cancelled(逾時是
    # 取消,continue-on-error 吸收不到)→觀測 run 轉「非綠」。放寬到 50 分鐘讓深跑
    # 完成,交由 continue-on-error 吸收模糊測試發現(那些發現本就列為待分流)。
    timeout-minutes: 50
    continue-on-error: true
    env:
      JWT_SECRET: ci-fuzz-secret-0123456789abcdef0123456789
      PG_DSN: postgresql://drone:dronedev@127.0.0.1:5432/drone
      MAX_EXAMPLES: 25
    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: drone
          POSTGRES_PASSWORD: dronedev
          POSTGRES_DB: drone
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U drone -d drone"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.10"

      - name: weekly 深跑檔位
        if: github.event_name != 'pull_request'
        # 深跑 120 examples(仍為 PR 25 的近 5 倍)。實測 300 examples 即使加 --no-shrink
        # 也是 volume-bound(單 admin 步 2 服務 × schema 一致檢查、對已知會回 500 的端點
        # 反覆命中),26 分鐘還卡在 admin,逼近 50m 天花板→對 runner 變異脆弱。120 讓三個
        # st run 合計約 15 分鐘完成、留足餘裕穩定綠;覆蓋度仍足供觀測期分流。
        run: echo "MAX_EXAMPLES=120" >> "$GITHUB_ENV"

      - name: 依賴
        run: |
          pip install schemathesis PyJWT
          pip install -e interfaces/proto/gen/python -e cloud/common
          pip install -r cloud/fleet_svc/requirements.txt
          pip install -r cloud/mission_svc/requirements.txt

      - name: 起服務(uvicorn;啟動自跑 migration)
        env:
          MQTT_HOST: 127.0.0.1
        run: |
          python -m uvicorn fleet_svc.main:app --host 127.0.0.1 --port 8091 \
            --app-dir cloud/fleet_svc &
          python -m uvicorn mission_svc.main:app --host 127.0.0.1 --port 8092 \
            --app-dir cloud/mission_svc &
          for p in 8091 8092; do
            for _ in $(seq 1 30); do
              curl -fsS "http://127.0.0.1:$p/healthz" >/dev/null 2>&1 && break; sleep 1
            done
          done

      - name: 鑄 token(admin / operator)
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          import os, time, jwt
          s = os.environ["JWT_SECRET"]
          now = int(time.time())
          def mk(role):
              return jwt.encode({"sub":"fuzz","role":role,"org":"fuzz","iat":now,"exp":now+3600}, s, algorithm="HS256")
          print(f"TOK_ADMIN={mk('admin')}")
          print(f"TOK_OPERATOR={mk('operator')}")
          PY

      - name: unauth 保護斷言(確定性,blocking 語意——見下註)
        run: |
          python tools/loadgen/assert_unauth.py --base http://127.0.0.1:8091 --openapi cloud/fleet_svc/openapi.json
          python tools/loadgen/assert_unauth.py --base http://127.0.0.1:8092 --openapi cloud/mission_svc/openapi.json

      # --no-shrink:偵測到 server error 就回報,不做「收斂到最小反例」。已知的待分流
      # 500 輸入(surrogate serial/超大整數)每個都觸發昂貴 shrinking,300 examples ×
      # 3 個 st run 會把 weekly 深跑拖到逾時(即使 50m 也撞牆)。關掉 shrink 後仍偵測
      # 到同樣的錯誤(反例非最小但足供分流),執行時間收斂到數分鐘。
      - name: schemathesis(admin;not_a_server_error + schema 一致)
        run: |
          for svc in "fleet_svc:8091" "mission_svc:8092"; do
            name="${svc%%:*}"; port="${svc##*:}"
            st run "cloud/${name}/openapi.json" --url "http://127.0.0.1:${port}" \
              -H "Authorization: Bearer ${TOK_ADMIN}" \
              --checks not_a_server_error,response_schema_conformance \
              --max-examples "${MAX_EXAMPLES}" --no-shrink \
              --exclude-path /api/v1/billing/callback || true
          done

      - name: schemathesis(operator;402/429 為合法回應)
        run: |
          st run cloud/fleet_svc/openapi.json --url http://127.0.0.1:8091 \
            -H "Authorization: Bearer ${TOK_OPERATOR}" \
            --checks not_a_server_error --max-examples "${MAX_EXAMPLES}" --no-shrink \
            --exclude-path /api/v1/billing/callback || true

      - name: weekly 失敗開 issue
        if: failure() && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "api-fuzz weekly 失敗($(date -u +%F))" \
            --body "run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --label bug || true
