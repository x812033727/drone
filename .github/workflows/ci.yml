name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: 安裝工具與測試依賴
        # 各子系統 requirements 存在才裝(本 workflow 需在堆疊合併的任何中間狀態都可跑)
        run: |
          pip install ruff pytest pytest-cov
          # tools/flight_ops 與 tools/sitl_scenarios 目前無獨立 requirements
          # (執行依賴由 tools/requirements.txt 供給,單測不需 SITL);
          # 之後若拆出各自的 requirements.txt,此迴圈已條件式涵蓋
          for f in tools/requirements.txt \
                   tools/flight_ops/requirements.txt \
                   tools/sitl_scenarios/requirements.txt \
                   onboard/drone_agent/requirements.txt \
                   cloud/ingest/requirements.txt \
                   cloud/log_svc/requirements.txt \
                   cloud/fleet_svc/requirements.txt \
                   cloud/mission_svc/requirements.txt; do
            if [ -f "$f" ]; then pip install -r "$f"; fi
          done
          if [ -d interfaces/proto/gen/python ]; then
            pip install -e interfaces/proto/gen/python
          fi
          # mission_exec 為可安裝套件(S11 起):editable 安裝,依賴由 pyproject 帶入
          if [ -f onboard/mission_exec/pyproject.toml ]; then
            pip install -e onboard/mission_exec
          fi

      - name: Ruff 靜態檢查
        run: ruff check .

      - name: Pytest（含覆蓋率量測）
        # 覆蓋率起步為「量測/可見度」(term 摘要 + xml),不設硬門檻;
        # SITL 場景與整合 CLI 屬 nightly 驗證,拉低總覆蓋屬預期。
        # 穩定後可對純邏輯模組加 --cov-fail-under。
        run: pytest -q --cov --cov-report=term-missing --cov-report=xml
