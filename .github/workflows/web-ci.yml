name: web-ci

# Web 主控台前端守門:lint + typecheck + build + tier-1 E2E(Playwright,
# 全網路 mock + 真 mock_oidc PKCE;無 docker,blocking)。路徑觸發。
on:
  push:
    branches: [main]
    paths:
      - "gcs/web-console/**"
      - ".github/workflows/web-ci.yml"
  pull_request:
    paths:
      - "gcs/web-console/**"
      - ".github/workflows/web-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: gcs/web-console
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: gcs/web-console/package-lock.json
      - name: 安裝依賴
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: 型別檢查
        run: npm run typecheck
      - name: 建置
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: gcs/web-console
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: gcs/web-console/package-lock.json
      - uses: actions/setup-python@v7
        with:
          python-version: "3.10"
      - name: mock_oidc 依賴
        run: pip install PyJWT cryptography
      - name: 安裝依賴
        run: npm ci
      - name: Playwright chromium 快取
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('gcs/web-console/package-lock.json') }}
      - name: 安裝 chromium
        run: npx playwright install --with-deps chromium
      - name: 建置(preview 服務 dist/)
        run: npm run build
      - name: tier-1 E2E(mock API + 真 mock_oidc PKCE)
        run: npm run test:e2e
      - name: 失敗打包 trace
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: gcs/web-console/test-results/
          retention-days: 7
